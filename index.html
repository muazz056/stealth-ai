
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Stealth Assist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configure Tailwind CDN to use class-based dark mode
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    
    /* Default light mode for initial load */
    html {
      background-color: #ffffff;
      color: #000000;
    }
    
    /* Dark mode for initial load */
    html.dark {
      background-color: #020617;
      color: #f8fafc;
    }
    
    /* OVERLAY MODE - Always transparent, ignores dark/light mode */
    body.overlay-mode,
    body.overlay-mode html,
    html:has(body.overlay-mode) {
      background: transparent !important;
      background-color: transparent !important;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    /* Dark mode scrollbar */
    html.dark ::-webkit-scrollbar-track { background: #1e293b; }
    html.dark ::-webkit-scrollbar-thumb { background: #475569; }
    html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    /* Hide the PiP source elements */
    #pip-source {
      position: absolute;
      left: -9999px;
      top: -9999px;
      pointer-events: none;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <!-- Elements for PiP Stealth Engine -->
  <div id="pip-source">
    <canvas id="pip-canvas" width="400" height="300"></canvas>
    <video id="pip-video" autoplay muted playsinline></video>
  </div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
